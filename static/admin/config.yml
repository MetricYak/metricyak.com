backend:
  name: github
  repo: metricyak/metricyak.com
  branch: main
  base_url: https://metricyak.com
  auth_endpoint: api/auth

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "docs"
    label: "Docs"
    folder: "content/docs"
    create: true
    extension: "mdx"
    format: "frontmatter"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Order", name: "order", widget: "number" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "blog"
    label: "Blog"
    folder: "content/blog"
    create: true
    path: "{{slug}}/index"
    extension: "mdx"
    format: "frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "date" }
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "pricing"
    label: "Pricing"
    files:
      - name: "tiers"
        label: "Pricing Tiers"
        file: "content/pricing.json"
        fields:
          - label: "Tiers"
            name: "tiers"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Features", name: "features", widget: "list" }
              - label: "CTA"
                name: "cta"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Href", name: "href", widget: "string" }
              - { label: "Highlighted", name: "highlighted", widget: "boolean", required: false }
